<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100" role="img" aria-label="M45 Protocol">
  <title>M45 Protocol</title>
  <desc>Pleiades constellation mark with M45 PROTOCOL wordmark</desc>

  <g transform="translate(50, 50)">
    <!-- Pleiades mark -->
    <g>
      <circle cx="0" cy="0" r="42" fill="none" stroke="#1a3a2e" stroke-width="0.9" opacity="0.5"/>
      <g stroke="#1a3a2e" stroke-width="0.5" opacity="0.4">
        <line x1="0" y1="0" x2="-20" y2="-11"/>
        <line x1="-20" y1="-11" x2="-26" y2="-26"/>
        <line x1="-20" y1="-11" x2="-7" y2="-25"/>
        <line x1="0" y1="0" x2="-7" y2="-25"/>
        <line x1="0" y1="0" x2="-4" y2="16"/>
        <line x1="0" y1="0" x2="19" y2="19"/>
        <line x1="19" y1="19" x2="25" y2="21"/>
      </g>
      <circle cx="0" cy="0" r="3.4" fill="#1a3a2e"/>
      <circle cx="-20" cy="-11" r="2.2" fill="#1a3a2e"/>
      <circle cx="-7" cy="-25" r="2.2" fill="#1a3a2e"/>
      <circle cx="-26" cy="-26" r="1.6" fill="#1a3a2e"/>
      <circle cx="-4" cy="16" r="2" fill="#1a3a2e"/>
      <circle cx="19" cy="19" r="2.2" fill="#1a3a2e"/>
      <circle cx="25" cy="21" r="1.6" fill="#1a3a2e"/>
    </g>

    <!-- Divider -->
    <line x1="72" y1="-26" x2="72" y2="26" stroke="#1a3a2e" stroke-width="0.5" opacity="0.35"/>

    <!-- Wordmark -->
    <text x="92" y="14" font-family="Fraunces, Georgia, 'Times New Roman', serif"
          font-size="38" font-weight="400" fill="#1a3a2e" letter-spacing="0.02em">M45</text>
    <text x="186" y="14" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="500" fill="#1a3a2e" letter-spacing="0.42em">PROTOCOL</text>
  </g>
</svg>
